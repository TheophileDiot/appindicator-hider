name: Release

on:
  pull_request:
  push:
    branches:
      - dev
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  UUID: appindicator-hider@theophilediot.github.io
  ZIP: dist/appindicator-hider@theophilediot.github.io.shell-extension.zip

jobs:
  package:
    name: Validate and package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Reject fork automation changes
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          changed="$(
            git diff --name-only "$BASE_SHA" "$GITHUB_SHA" -- \
              .github/workflows \
              .github/dependabot.yml \
              Makefile
          )"

          if [ -n "$changed" ]; then
            echo "Automation changes from fork pull requests are not accepted directly." >&2
            echo "A maintainer must recreate the reviewed change from a trusted branch." >&2
            printf '%s\n' "$changed" >&2
            exit 1
          fi

      - name: Install GNOME packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gnome-shell libglib2.0-bin jq unzip

      - name: Check release version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          expected="v$(cat VERSION)"
          actual="${GITHUB_REF_NAME}"
          test "$actual" = "$expected" || {
            echo "Tag $actual does not match VERSION $expected" >&2
            exit 1
          }

      - name: Validate metadata
        run: |
          test "$(jq -r '.uuid' metadata.json)" = "$UUID"
          jq -e 'has("version") | not' metadata.json >/dev/null
          jq -e '."shell-version" | length > 0' metadata.json >/dev/null

      - name: Build package
        run: make release-check

      - name: Verify package contents
        run: |
          unzip -l "$ZIP"
          unzip -Z1 "$ZIP" | sort > actual-files.txt
          cat > expected-files.txt <<'EOF'
          extension.js
          metadata.json
          prefs.js
          schemas/
          schemas/org.gnome.shell.extensions.appindicator-hider.gschema.xml
          EOF
          sed -i 's/^          //' expected-files.txt
          diff -u expected-files.txt actual-files.txt

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: extension-zip
          path: ${{ env.ZIP }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: extension-zip
          path: dist
          digest-mismatch: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test -f "$ZIP"
          gh release create "$GITHUB_REF_NAME" "$ZIP" \
            --title "AppIndicator Hider $GITHUB_REF_NAME" \
            --generate-notes
